<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOM FPS • Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#0a0a0a; }
        #game-container { position:relative; width:100vw; height:100vh; }
        #ui-overlay { position:absolute; inset:0; pointer-events:none; z-index:10; }
        .hud { pointer-events:auto; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:24px; height:24px; pointer-events:none; }
        #crosshair::before, #crosshair::after { content:''; position:absolute; background:#ff3333; }
        #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
        #crosshair::after { width:100%; height:2px; top:50%; transform:translateY(-50%); }
        .control-btn { pointer-events:auto; touch-action:manipulation; }
        .game-btn { background:rgba(0,0,0,0.65); border:3px solid #c53030; color:#fff; font-weight:700; }
        .shoot-btn { background:linear-gradient(145deg,#c53030,#9b2c2c); border:4px solid #fed7d7; }
    </style>
</head>
<body class="bg-black text-white">
    <div id="game-container">
        <div id="ui-overlay" class="flex flex-col justify-between p-4">
            <div class="flex justify-between items-start hud">
                <div class="bg-black/70 px-4 py-2 rounded border border-red-800">
                    <div class="text-red-500 text-xs tracking-[3px]">SCORE</div>
                    <div id="score" class="text-4xl font-bold">00000</div>
                </div>
                <div class="bg-black/70 px-3 py-1.5 rounded border border-red-800 text-right">
                    <div class="text-red-500 text-[10px] tracking-widest">TARGETS LEFT</div>
                    <div id="targets-left" class="text-2xl font-bold text-red-400">5</div>
                </div>
            </div>
            <div id="message" class="self-center bg-black/60 px-6 py-2 rounded text-center text-sm border border-red-900/50 hidden">
                <span class="text-red-400">DESTROY THE GOBLINS</span>
            </div>
            <div class="flex justify-between items-end pb-2 hud">
                <div id="controls" class="grid grid-cols-3 gap-1.5 w-[170px]">
                    <div></div>
                    <button id="btn-forward" class="control-btn game-btn col-start-2 h-14 w-14 text-2xl rounded-xl">↑</button>
                    <div></div>
                    <button id="btn-left" class="control-btn game-btn h-14 w-14 text-2xl rounded-xl">←</button>
                    <button id="btn-backward" class="control-btn game-btn h-14 w-14 text-2xl rounded-xl">↓</button>
                    <button id="btn-right" class="control-btn game-btn h-14 w-14 text-2xl rounded-xl">→</button>
                </div>
                <button id="btn-shoot" class="control-btn shoot-btn text-white font-black px-8 py-3 text-xl rounded-2xl">SHOOT</button>
            </div>
        </div>
        <div id="crosshair"></div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let yaw = 0, pitch = -0.1;
        let moveForward=false, moveBackward=false, moveLeft=false, moveRight=false;
        let lastShotTime=0, score=0;
        let projectiles=[], particles=[], enemies=[], wallAABBs=[];
        let goblinTexture = null;
        const GRAVITY=22, PLAYER_SPEED=11, BULLET_SPEED=48, PLAYER_RADIUS=0.5;

        function updateScore() { document.getElementById('score').textContent = score.toString().padStart(5,'0'); }
        function updateTargetsLeft() { document.getElementById('targets-left').textContent = enemies.length; }

        function createWallAABB(minX,maxX,minZ,maxZ){ wallAABBs.push({minX,maxX,minZ,maxZ}); }

        function checkPlayerCollision(x,z){
            const r = PLAYER_RADIUS;
            for(const w of wallAABBs){
                if(x+r > w.minX && x-r < w.maxX && z+r > w.minZ && z-r < w.maxZ) return true;
            }
            return false;
        }

        function createParticle(pos, vel, life, color, isDebris=false){
            const m = new THREE.Mesh(new THREE.SphereGeometry(isDebris?0.15:0.08,5,5), new THREE.MeshPhongMaterial({color, emissive:color, transparent:true}));
            m.position.copy(pos); scene.add(m);
            particles.push({mesh:m, vel, life, maxLife:life, isDebris});
        }

        function fireProjectile(){
            if(Date.now()-lastShotTime < 130) return;
            lastShotTime = Date.now();
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            const start = camera.position.clone().add(dir.clone().multiplyScalar(1.3));
            const p = new THREE.Mesh(new THREE.SphereGeometry(0.12,6,6), new THREE.MeshPhongMaterial({color:0xffcc33, emissive:0xff6600}));
            p.position.copy(start); scene.add(p);
            projectiles.push({mesh:p, vel: dir.clone().multiplyScalar(BULLET_SPEED), life:2.5});
        }

        function updateProjectiles(dt){
            for(let i=projectiles.length-1; i>=0; i--){
                const p = projectiles[i];
                p.vel.y -= GRAVITY*0.5*dt;
                p.mesh.position.addScaledVector(p.vel, dt);
                p.life -= dt;
                let hit = p.mesh.position.y < 0.2;
                for(const w of wallAABBs){ if(p.mesh.position.x>w.minX&&p.mesh.position.x<w.maxX && p.mesh.position.z>w.minZ&&p.mesh.position.z<w.maxZ){hit=true;break;} }
                if(hit || p.life<=0){ scene.remove(p.mesh); projectiles.splice(i,1); if(hit) createParticle(p.mesh.position.clone(), new THREE.Vector3(0,3,0), 0.8, 0x666666, true); }
            }
        }

        function updateParticles(dt){
            for(let i=particles.length-1;i>=0;i--){
                const p=particles[i];
                p.vel.y -= GRAVITY*dt; p.mesh.position.addScaledVector(p.vel,dt); p.life-=dt;
                if(p.mesh.material) p.mesh.material.opacity = Math.max(0.1, p.life/p.maxLife);
                if(p.isDebris && p.mesh.position.y<0.1 && p.vel.y<0){ p.mesh.position.y=0.1; p.vel.y*=-0.4; p.vel.x*=0.6; p.vel.z*=0.6; }
                if(p.life<=0){scene.remove(p.mesh); particles.splice(i,1);}
            }
        }

        function checkHits(){
            for(let i=projectiles.length-1;i>=0;i--){
                const pr = projectiles[i];
                for(let j=enemies.length-1;j>=0;j--){
                    if(pr.mesh.position.distanceTo(enemies[j].mesh.position) < 1.6){
                        createParticle(pr.mesh.position.clone(), new THREE.Vector3(0,4,0), 1.2, 0xff3311, true);
                        scene.remove(pr.mesh); projectiles.splice(i,1);
                        scene.remove(enemies[j].mesh); enemies.splice(j,1);
                        score += 100; updateScore(); updateTargetsLeft();
                        setTimeout(()=>{ if(enemies.length < 5) spawnEnemy(); }, 1800);
                        return;
                    }
                }
            }
        }

        function spawnEnemy(){
            const spots = [[-12,1,-12],[12,1,-10],[-10,1,10],[10,1,11],[0,1,-9],[-8,1,7]];
            let p = spots[Math.floor(Math.random()*spots.length)];
            let mesh;
            if(goblinTexture){
                const g = new THREE.PlaneGeometry(1.6, 2.2);
                const m = new THREE.MeshBasicMaterial({map: goblinTexture, transparent:true, side:THREE.DoubleSide});
                mesh = new THREE.Mesh(g, m);
                mesh.userData.isGoblin = true;
            } else {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.5,1.8,6), new THREE.MeshPhongMaterial({color:0x9f1f1f, emissive:0x3a0a0a}));
            }
            mesh.position.set(p[0], p[1], p[2]);
            scene.add(mesh);
            enemies.push({mesh});
            updateTargetsLeft();
        }

        function setupScene(){
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 6, 40);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.7, 7);           // Slightly higher and further back
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({antialias:true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lights
            scene.add(new THREE.AmbientLight(0x555555, 0.85));
            const sun = new THREE.DirectionalLight(0xfff0cc, 1.2); sun.position.set(10,25,10); scene.add(sun);
            scene.add(new THREE.HemisphereLight(0xaaaabb, 0x222222, 0.4));

            // Floor
            const floorMat = new THREE.MeshPhongMaterial({color: 0x2a2520, shininess:4});
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(45,45), floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.position.y = 0;
            scene.add(floor);

            // Simple walls & pillars
            const wallMat = new THREE.MeshPhongMaterial({color:0x3a322b});
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(1,6,45), wallMat)).position.set(-22,3,0);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(1,6,45), wallMat)).position.set(22,3,0);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(45,6,1), wallMat)).position.set(0,3,-22);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(45,6,1), wallMat)).position.set(0,3,22);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(3,4,3), new THREE.MeshPhongMaterial({color:0x403830}))).position.set(0,2,0);

            // === LOAD GOBLIN TEXTURE THEN SPAWN ENEMIES ===
            const loader = new THREE.TextureLoader();
            loader.load('asset/goblin-creature.jpg', (tex) => {
                goblinTexture = tex;
                console.log('%c[Goblins] Texture loaded successfully!', 'color:#4ade80');
                // Spawn enemies only after texture is ready
                for(let i=0; i<6; i++) spawnEnemy();
            }, undefined, () => {
                // If texture fails to load, still spawn fallback enemies
                console.warn('Goblin texture failed to load, using fallback');
                for(let i=0; i<5; i++) spawnEnemy();
            });

            // Initial camera rotation
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function updateMovement(dt){
            const d = PLAYER_SPEED * dt;
            const ya = new THREE.Vector3(0,1,0);
            if(moveForward){ const dir = new THREE.Vector3(0,0,-1).applyAxisAngle(ya,yaw); const nx = camera.position.x + dir.x*d; const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; }
            if(moveBackward){ const dir = new THREE.Vector3(0,0,1).applyAxisAngle(ya,yaw); const nx = camera.position.x + dir.x*d; const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; }
            if(moveLeft){ const dir = new THREE.Vector3(-1,0,0).applyAxisAngle(ya,yaw); const nx = camera.position.x + dir.x*d; const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; }
            if(moveRight){ const dir = new THREE.Vector3(1,0,0).applyAxisAngle(ya,yaw); const nx = camera.position.x + dir.x*d; const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; }

            camera.position.y = 1.7; // Keep player above floor
        }

        function animate(){
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            updateMovement(dt);
            updateProjectiles(dt);
            updateParticles(dt);
            checkHits();

            // Billboard goblins
            enemies.forEach(e => {
                if(e.mesh.userData.isGoblin){
                    const p = e.mesh.position;
                    e.mesh.lookAt(camera.position.x, p.y, camera.position.z);
                }
            });

            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
            renderer.render(scene, camera);
        }

        function setupControls(){
            const c = renderer.domElement;
            const bind = (id, flag) => {
                const b = document.getElementById(id);
                b.addEventListener('touchstart', e=>{e.preventDefault(); flag(true)}, {passive:false});
                const end = e => {e.preventDefault(); flag(false)};
                b.addEventListener('touchend', end, {passive:false});
                b.addEventListener('touchcancel', end, {passive:false});
            };
            bind('btn-forward', v=>moveForward=v);
            bind('btn-backward', v=>moveBackward=v);
            bind('btn-left', v=>moveLeft=v);
            bind('btn-right', v=>moveRight=v);

            const shootBtn = document.getElementById('btn-shoot');
            let si = null;
            shootBtn.addEventListener('touchstart', e=>{ e.preventDefault(); fireProjectile(); if(si)clearInterval(si); si=setInterval(fireProjectile,150); }, {passive:false});
            const stopShoot = () => {if(si){clearInterval(si);si=null}};
            shootBtn.addEventListener('touchend', stopShoot, {passive:false});

            // Touch look
            c.addEventListener('touchstart', e => { if(e.target.closest('#controls') || e.target.id==='btn-shoot') return; isLooking=true; lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY; }, {passive:false});
            c.addEventListener('touchmove', e => { if(!isLooking) return; const t=e.touches[0]; yaw += (t.clientX-lastTouchX)*0.003; pitch -= (t.clientY-lastTouchY)*0.003; pitch=Math.max(-1.3,Math.min(0.9,pitch)); lastTouchX=t.clientX; lastTouchY=t.clientY; }, {passive:false});
            c.addEventListener('touchend', ()=> isLooking=false);

            window.addEventListener('resize', ()=>{ camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function startGame(){
            setupScene();
            clock = new THREE.Clock();
            setupControls();
            updateScore();
            updateTargetsLeft();
            animate();
            console.log('%c[Doom FPS] Fixed camera + goblin enemies ready', 'color:#22c55e');
        }
        window.onload = startGame;

        // Touch look variables
        let isLooking = false, lastTouchX=0, lastTouchY=0;
    </script>
</body>
</html>
