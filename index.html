<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOM FPS • Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: system-ui, -apple-system, sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .hud { pointer-events: auto; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #ff3333; }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
        .control-btn { 
            pointer-events: auto; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        .control-btn:active { 
            transform: scale(0.92); 
            filter: brightness(1.3);
        }
        .doom-text { font-family: 'Press Start 2P', system-ui; }
        .game-btn {
            background: rgba(0,0,0,0.65);
            border: 3px solid #c53030;
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(197,48,48,0.6);
        }
        .shoot-btn {
            background: linear-gradient(145deg, #c53030, #9b2c2c);
            border: 4px solid #fed7d7;
            box-shadow: 0 0 20px rgba(197, 48, 48, 0.5);
        }
    </style>
</head>
<body class="bg-black text-white">
    <div id="game-container">
        <!-- Three.js will append canvas here -->
        
        <!-- HUD -->
        <div id="ui-overlay" class="flex flex-col justify-between p-4">
            <!-- Top HUD -->
            <div class="flex justify-between items-start hud">
                <div class="bg-black/70 px-4 py-2 rounded border border-red-800">
                    <div class="text-red-500 text-xs tracking-[3px] doom-text">SCORE</div>
                    <div id="score" class="text-4xl font-bold text-white doom-text">00000</div>
                </div>
                
                <div class="bg-black/70 px-3 py-1.5 rounded border border-red-800 text-right">
                    <div class="text-red-500 text-[10px] tracking-widest doom-text">TARGETS LEFT</div>
                    <div id="targets-left" class="text-2xl font-bold text-red-400 doom-text">5</div>
                </div>
            </div>

            <!-- Center message -->
            <div id="message" class="self-center bg-black/60 px-6 py-2 rounded text-center text-sm border border-red-900/50 max-w-[260px] hidden">
                <span class="doom-text text-red-400">DESTROY THE RED TARGETS</span>
            </div>

            <!-- Bottom Controls -->
            <div class="flex justify-between items-end pb-2 hud">
                <!-- Movement D-Pad -->
                <div id="controls" class="grid grid-cols-3 gap-1.5 w-[170px]">
                    <!-- Empty top left -->
                    <div></div>
                    
                    <!-- Forward -->
                    <button id="btn-forward"
                            class="control-btn game-btn col-start-2 h-14 w-14 flex items-center justify-center text-2xl rounded-xl active:scale-95">
                        ↑
                    </button>
                    
                    <div></div>
                    
                    <!-- Left -->
                    <button id="btn-left"
                            class="control-btn game-btn h-14 w-14 flex items-center justify-center text-2xl rounded-xl active:scale-95">
                        ←
                    </button>
                    
                    <!-- Backward -->
                    <button id="btn-backward"
                            class="control-btn game-btn h-14 w-14 flex items-center justify-center text-2xl rounded-xl active:scale-95">
                        ↓
                    </button>
                    
                    <!-- Right -->
                    <button id="btn-right"
                            class="control-btn game-btn h-14 w-14 flex items-center justify-center text-2xl rounded-xl active:scale-95">
                        →
                    </button>
                </div>

                <!-- Shoot Button -->
                <div class="flex flex-col items-end">
                    <button id="btn-shoot"
                            class="control-btn shoot-btn text-white font-black tracking-[2px] doom-text px-8 py-3 text-xl rounded-2xl shadow-2xl active:scale-[0.96] flex items-center gap-2">
                        <span>SHOOT</span>
                        <span class="text-3xl">🔫</span>
                    </button>
                    <div class="text-[10px] text-red-400/70 mt-1 pr-1 doom-text tracking-widest">HOLD TO FIRE</div>
                </div>
            </div>
        </div>

        <!-- Crosshair -->
        <div id="crosshair"></div>
    </div>

    <script>
        // Tailwind script
        function initTailwind() {
            document.documentElement.style.setProperty('--accent', '#c53030');
        }

        // Game variables
        let scene, camera, renderer;
        let clock;
        let yaw = 0;
        let pitch = -0.15;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let lastShotTime = 0;
        let score = 0;
        let projectiles = [];
        let particles = [];
        let enemies = [];
        let wallAABBs = [];
        const GRAVITY = 22;
        const PLAYER_SPEED = 11;
        const BULLET_SPEED = 48;
        const PLAYER_RADIUS = 0.55;
        const FLOOR_Y = 0;

        // Touch look
        let isLooking = false;
        let lastTouchX = 0;
        let lastTouchY = 0;
        const LOOK_SENS = 0.0032;

        function updateScore() {
            const el = document.getElementById('score');
            el.textContent = score.toString().padStart(5, '0');
        }

        function updateTargetsLeft() {
            const el = document.getElementById('targets-left');
            el.textContent = enemies.length;
        }

        function createWallAABB(minX, maxX, minZ, maxZ) {
            wallAABBs.push({ minX, maxX, minZ, maxZ });
        }

        function checkPlayerCollision(x, z) {
            const r = PLAYER_RADIUS;
            for (const wall of wallAABBs) {
                if (x + r > wall.minX && x - r < wall.maxX &&
                    z + r > wall.minZ && z - r < wall.maxZ) {
                    return true;
                }
            }
            return false;
        }

        function createParticle(pos, velocity, life, color, isDebris = false) {
            const size = isDebris ? (0.12 + Math.random() * 0.18) : (0.06 + Math.random() * 0.08);
            const geo = new THREE.SphereGeometry(size, 5, 5);
            const mat = new THREE.MeshPhongMaterial({
                color: color,
                emissive: isDebris ? 0x111111 : color,
                transparent: true,
                opacity: 0.95,
                shininess: isDebris ? 2 : 10
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(pos);
            scene.add(mesh);

            particles.push({
                mesh,
                vel: velocity,
                life: life,
                maxLife: life,
                isDebris
            });
        }

        function createMuzzleFlash(pos, direction) {
            for (let i = 0; i < 9; i++) {
                const vel = direction.clone().multiplyScalar(7 + Math.random() * 6);
                vel.x += (Math.random() - 0.5) * 2.2;
                vel.y += (Math.random() - 0.5) * 1.8;
                vel.z += (Math.random() - 0.5) * 2.2;
                const life = 0.18 + Math.random() * 0.12;
                createParticle(pos, vel, life, 0xffee88, false);
            }
        }

        function createImpactParticles(pos, isFloor = false) {
            const count = isFloor ? 12 : 18;
            const colors = isFloor ? [0x555555, 0x777744, 0x664422] : [0xff4422, 0xaa2211, 0xffaa33, 0x442211];
            
            for (let i = 0; i < count; i++) {
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * (isFloor ? 6 : 11),
                    isFloor ? (1.5 + Math.random() * 4) : (3 + Math.random() * 9),
                    (Math.random() - 0.5) * (isFloor ? 6 : 11)
                );
                if (!isFloor) {
                    // slight upward bias for wall hits
                    vel.y = Math.max(vel.y, 1);
                }
                const life = isFloor ? (0.6 + Math.random() * 0.7) : (0.9 + Math.random() * 1.1);
                const col = colors[Math.floor(Math.random() * colors.length)];
                createParticle(pos, vel, life, col, true);
            }
        }

        function createExplosion(pos) {
            // Big satisfying explosion
            for (let i = 0; i < 26; i++) {
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 13,
                    (Math.random() * 11) + 2,
                    (Math.random() - 0.5) * 13
                );
                const life = 1.1 + Math.random() * 1.3;
                const colors = [0xff3311, 0xcc2200, 0xffaa22, 0x552200];
                const col = colors[Math.floor(Math.random() * colors.length)];
                createParticle(pos, vel, life, col, true);
            }
        }

        function fireProjectile() {
            const now = Date.now();
            if (now - lastShotTime < 140) return; // fire rate limit
            lastShotTime = now;

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);

            // Start slightly in front of camera
            const startPos = camera.position.clone().add(dir.clone().multiplyScalar(1.4));
            startPos.y += 0.05; // slight gun height

            const projGeo = new THREE.SphereGeometry(0.13, 7, 7);
            const projMat = new THREE.MeshPhongMaterial({
                color: 0xffcc33,
                emissive: 0xff6600,
                shininess: 30
            });
            const projMesh = new THREE.Mesh(projGeo, projMat);
            projMesh.position.copy(startPos);
            scene.add(projMesh);

            const vel = dir.clone().multiplyScalar(BULLET_SPEED);
            // Add very slight gravity arc
            vel.y -= 1.5;

            projectiles.push({
                mesh: projMesh,
                vel: vel,
                life: 2.8
            });

            // Muzzle flash
            createMuzzleFlash(startPos, dir);
        }

        function updateProjectiles(dt) {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.vel.y -= GRAVITY * 0.6 * dt; // light gravity
                p.mesh.position.x += p.vel.x * dt;
                p.mesh.position.y += p.vel.y * dt;
                p.mesh.position.z += p.vel.z * dt;
                p.life -= dt;

                let hit = false;
                const pos = p.mesh.position;

                // Floor hit
                if (pos.y < 0.25) {
                    createImpactParticles(pos.clone(), true);
                    hit = true;
                }

                // Wall collision (simple AABB)
                for (const wall of wallAABBs) {
                    if (pos.x > wall.minX && pos.x < wall.maxX &&
                        pos.z > wall.minZ && pos.z < wall.maxZ) {
                        createImpactParticles(pos.clone());
                        hit = true;
                        break;
                    }
                }

                // Out of bounds
                if (Math.abs(pos.x) > 23 || Math.abs(pos.z) > 23) {
                    hit = true;
                }

                if (hit || p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.vel.y -= GRAVITY * dt;
                p.mesh.position.x += p.vel.x * dt;
                p.mesh.position.y += p.vel.y * dt;
                p.mesh.position.z += p.vel.z * dt;
                p.life -= dt;

                // Fade
                const alpha = Math.max(0.05, p.life / p.maxLife);
                if (p.mesh.material) p.mesh.material.opacity = alpha;

                // Floor bounce for debris
                if (p.isDebris && p.mesh.position.y < 0.15 && p.vel.y < 0) {
                    p.mesh.position.y = 0.15;
                    p.vel.y = -p.vel.y * 0.45;
                    p.vel.x *= 0.65;
                    p.vel.z *= 0.65;
                    if (Math.abs(p.vel.y) < 2.5) {
                        p.life = Math.min(p.life, 0.4);
                    }
                }

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function checkProjectileEnemyCollisions() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                if (!proj.mesh) continue;

                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (!enemy.mesh) continue;

                    const dist = proj.mesh.position.distanceTo(enemy.mesh.position);
                    if (dist < 1.65) {
                        // Hit!
                        createExplosion(proj.mesh.position);
                        scene.remove(proj.mesh);
                        projectiles.splice(i, 1);

                        // Destroy enemy
                        scene.remove(enemy.mesh);
                        enemies.splice(j, 1);
                        score += 125;
                        updateScore();
                        updateTargetsLeft();

                        // Respawn a new target after delay
                        setTimeout(() => {
                            if (enemies.length < 5) {
                                spawnEnemy();
                            }
                        }, 2200);
                        return; // only one hit per frame
                    }
                }
            }
        }

        function spawnEnemy() {
            const positions = [
                [-13, 0.95, -13], [13, 0.95, -13],
                [-13, 0.95, 11], [11, 0.95, 13],
                [0, 0.95, -10], [-9, 0.95, 8],
                [8, 0.95, -7]
            ];
            
            // Find a position not too close to player and not overlapping existing
            let pos;
            let attempts = 0;
            do {
                pos = positions[Math.floor(Math.random() * positions.length)];
                attempts++;
            } while (attempts < 8 && camera.position.distanceTo(new THREE.Vector3(pos[0], 1.6, pos[2])) < 6);

            const geo = new THREE.CylinderGeometry(0.65, 0.55, 1.75, 7);
            const mat = new THREE.MeshPhongMaterial({
                color: 0x9f1f1f,
                emissive: 0x4a0f0f,
                shininess: 8,
                flatShading: true
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(pos[0], pos[1], pos[2]);
            
            // Add slight random rotation
            mesh.rotation.y = Math.random() * Math.PI * 2;

            scene.add(mesh);
            enemies.push({ mesh });
            updateTargetsLeft();
        }

        function setupScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 8, 38);

            camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.65, 6);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = false; // disabled for mobile perf
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lights - moody atmosphere
            const ambient = new THREE.AmbientLight(0x3a3a3a, 0.55);
            scene.add(ambient);

            const dirLight = new THREE.DirectionalLight(0xfff0dd, 0.85);
            dirLight.position.set(12, 22, 8);
            scene.add(dirLight);

            const redLight = new THREE.PointLight(0xff3311, 0.6, 25);
            redLight.position.set(-8, 4, -8);
            scene.add(redLight);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(42, 42);
            const floorMat = new THREE.MeshPhongMaterial({ 
                color: 0x1f1a17, 
                shininess: 4,
                flatShading: false
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = FLOOR_Y;
            scene.add(floor);

            // Ceiling
            const ceil = new THREE.Mesh(floorGeo, new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 2 }));
            ceil.rotation.x = -Math.PI / 2;
            ceil.position.y = 5.8;
            scene.add(ceil);

            // Perimeter walls
            const wallMat = new THREE.MeshPhongMaterial({ color: 0x2c2520, shininess: 3 });
            const wallHeight = 5.5;

            // Left wall
            let wall = new THREE.Mesh(new THREE.BoxGeometry(1.2, wallHeight, 42), wallMat);
            wall.position.set(-20.6, wallHeight/2, 0);
            scene.add(wall);
            createWallAABB(-21.2, -20, -21, 21);

            // Right wall
            wall = new THREE.Mesh(new THREE.BoxGeometry(1.2, wallHeight, 42), wallMat);
            wall.position.set(20.6, wallHeight/2, 0);
            scene.add(wall);
            createWallAABB(20, 21.2, -21, 21);

            // Back wall (negative Z)
            wall = new THREE.Mesh(new THREE.BoxGeometry(42, wallHeight, 1.2), wallMat);
            wall.position.set(0, wallHeight/2, -20.6);
            scene.add(wall);
            createWallAABB(-21, 21, -21.2, -20);

            // Front wall
            wall = new THREE.Mesh(new THREE.BoxGeometry(42, wallHeight, 1.2), wallMat);
            wall.position.set(0, wallHeight/2, 20.6);
            scene.add(wall);
            createWallAABB(-21, 21, 20, 21.2);

            // Internal obstacles / pillars
            const pillarMat = new THREE.MeshPhongMaterial({ color: 0x3a2f28, shininess: 5 });
            
            // Center pillar
            wall = new THREE.Mesh(new THREE.BoxGeometry(3.2, 4.2, 3.2), pillarMat);
            wall.position.set(0, 2.1, 0);
            scene.add(wall);
            createWallAABB(-1.6, 1.6, -1.6, 1.6);

            // Side crate 1
            wall = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2.8, 2.4), pillarMat);
            wall.position.set(-9, 1.4, -9);
            scene.add(wall);
            createWallAABB(-10.2, -7.8, -10.2, -7.8);

            // Side crate 2
            wall = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.2, 2.8), pillarMat);
            wall.position.set(9.5, 1.1, 8);
            scene.add(wall);
            createWallAABB(8.1, 10.9, 6.6, 9.4);

            // Spawn initial enemies
            for (let i = 0; i < 5; i++) {
                spawnEnemy();
            }

            // Initial camera rotation
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Show initial message briefly
            const msg = document.getElementById('message');
            msg.classList.remove('hidden');
            setTimeout(() => {
                msg.style.transition = 'opacity 1.2s ease';
                msg.style.opacity = '0';
                setTimeout(() => msg.classList.add('hidden'), 1200);
            }, 2800);
        }

        function updateMovement(dt) {
            const moveDist = PLAYER_SPEED * dt;
            const yAxis = new THREE.Vector3(0, 1, 0);

            // Forward
            if (moveForward) {
                const dir = new THREE.Vector3(0, 0, -1).applyAxisAngle(yAxis, yaw);
                const newX = camera.position.x + dir.x * moveDist;
                const newZ = camera.position.z + dir.z * moveDist;
                if (!checkPlayerCollision(newX, camera.position.z)) camera.position.x = newX;
                if (!checkPlayerCollision(camera.position.x, newZ)) camera.position.z = newZ;
            }

            // Backward
            if (moveBackward) {
                const dir = new THREE.Vector3(0, 0, 1).applyAxisAngle(yAxis, yaw);
                const newX = camera.position.x + dir.x * moveDist;
                const newZ = camera.position.z + dir.z * moveDist;
                if (!checkPlayerCollision(newX, camera.position.z)) camera.position.x = newX;
                if (!checkPlayerCollision(camera.position.x, newZ)) camera.position.z = newZ;
            }

            // Strafe Left
            if (moveLeft) {
                const dir = new THREE.Vector3(-1, 0, 0).applyAxisAngle(yAxis, yaw);
                const newX = camera.position.x + dir.x * moveDist;
                const newZ = camera.position.z + dir.z * moveDist;
                if (!checkPlayerCollision(newX, camera.position.z)) camera.position.x = newX;
                if (!checkPlayerCollision(camera.position.x, newZ)) camera.position.z = newZ;
            }

            // Strafe Right
            if (moveRight) {
                const dir = new THREE.Vector3(1, 0, 0).applyAxisAngle(yAxis, yaw);
                const newX = camera.position.x + dir.x * moveDist;
                const newZ = camera.position.z + dir.z * moveDist;
                if (!checkPlayerCollision(newX, camera.position.z)) camera.position.x = newX;
                if (!checkPlayerCollision(camera.position.x, newZ)) camera.position.z = newZ;
            }

            // Keep player inside rough bounds + eye level
            camera.position.y = 1.65;
            camera.position.x = Math.max(-19, Math.min(19, camera.position.x));
            camera.position.z = Math.max(-19, Math.min(19, camera.position.z));
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.08);

            updateMovement(dt);
            updateProjectiles(dt);
            updateParticles(dt);
            checkProjectileEnemyCollisions();

            // Update camera rotation from yaw/pitch
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            renderer.render(scene, camera);
        }

        function setupControls() {
            const btnForward = document.getElementById('btn-forward');
            const btnBackward = document.getElementById('btn-backward');
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnShoot = document.getElementById('btn-shoot');
            const canvas = renderer.domElement;

            // Movement button handlers
            function bindButton(btn, flagSetter) {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    flagSetter(true);
                }, { passive: false });
                
                const endHandler = (e) => {
                    e.preventDefault();
                    flagSetter(false);
                };
                btn.addEventListener('touchend', endHandler, { passive: false });
                btn.addEventListener('touchcancel', endHandler, { passive: false });
                btn.addEventListener('mouseleave', () => flagSetter(false));
            }

            bindButton(btnForward, (val) => moveForward = val);
            bindButton(btnBackward, (val) => moveBackward = val);
            bindButton(btnLeft, (val) => moveLeft = val);
            bindButton(btnRight, (val) => moveRight = val);

            // Shoot button - tap or hold
            let shootInterval = null;
            btnShoot.addEventListener('touchstart', (e) => {
                e.preventDefault();
                fireProjectile();
                // Allow holding for rapid fire
                if (shootInterval) clearInterval(shootInterval);
                shootInterval = setInterval(() => {
                    fireProjectile();
                }, 160);
            }, { passive: false });

            const stopShooting = () => {
                if (shootInterval) {
                    clearInterval(shootInterval);
                    shootInterval = null;
                }
            };
            btnShoot.addEventListener('touchend', stopShooting, { passive: false });
            btnShoot.addEventListener('touchcancel', stopShooting, { passive: false });

            // Touch look on canvas
            canvas.addEventListener('touchstart', (e) => {
                // Ignore if touching a control button
                if (e.target.closest('#controls') || e.target.id === 'btn-shoot') {
                    return;
                }
                isLooking = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                if (!isLooking) return;
                const touch = e.touches[0];
                const dx = touch.clientX - lastTouchX;
                const dy = touch.clientY - lastTouchY;

                yaw += dx * LOOK_SENS;
                pitch -= dy * LOOK_SENS;

                // Clamp pitch
                pitch = Math.max(-1.35, Math.min(1.0, pitch));

                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                isLooking = false;
            });
            canvas.addEventListener('touchcancel', () => {
                isLooking = false;
            });

            // Desktop mouse support (bonus)
            let mouseDown = false;
            canvas.addEventListener('mousedown', (e) => {
                if (e.target.closest('#controls') || e.target.id === 'btn-shoot') return;
                mouseDown = true;
                lastTouchX = e.clientX;
                lastTouchY = e.clientY;
            });
            window.addEventListener('mousemove', (e) => {
                if (!mouseDown) return;
                const dx = e.clientX - lastTouchX;
                const dy = e.clientY - lastTouchY;
                yaw += dx * LOOK_SENS * 0.8;
                pitch -= dy * LOOK_SENS * 0.8;
                pitch = Math.max(-1.35, Math.min(1.0, pitch));
                lastTouchX = e.clientX;
                lastTouchY = e.clientY;
            });
            window.addEventListener('mouseup', () => { mouseDown = false; });

            // Keyboard support (nice for desktop testing)
            window.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') moveForward = true;
                if (e.key.toLowerCase() === 's' || e.key === 'ArrowDown') moveBackward = true;
                if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') moveLeft = true;
                if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') moveRight = true;
                if (e.key === ' ' || e.key.toLowerCase() === 'f') {
                    e.preventDefault();
                    fireProjectile();
                }
            });
            window.addEventListener('keyup', (e) => {
                if (e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') moveForward = false;
                if (e.key.toLowerCase() === 's' || e.key === 'ArrowDown') moveBackward = false;
                if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') moveLeft = false;
                if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') moveRight = false;
            });

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Prevent context menu on long press
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }

        function startGame() {
            initTailwind();
            setupScene();
            clock = new THREE.Clock();
            setupControls();
            updateScore();
            updateTargetsLeft();

            // Start animation loop
            animate();

            // Easter egg: click score to add points (dev)
            document.getElementById('score').addEventListener('click', () => {
                score += 500;
                updateScore();
            });

            console.log('%c[Doom FPS] Mobile 3D game ready. Enjoy!', 'color:#c53030');
        }

        // Boot the game
        window.onload = startGame;
    </script>
</body>
</html>
