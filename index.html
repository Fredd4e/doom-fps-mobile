<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOM FPS • Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#0a0a0a; }
        #game-container { position:relative; width:100vw; height:100vh; }
        #ui-overlay { position:absolute; inset:0; pointer-events:none; z-index:10; }
        .hud { pointer-events:auto; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:24px; height:24px; pointer-events:none; }
        #crosshair::before, #crosshair::after { content:''; position:absolute; background:#ff3333; }
        #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
        #crosshair::after { width:100%; height:2px; top:50%; transform:translateY(-50%); }
        .control-btn { pointer-events:auto; touch-action:manipulation; }
        .game-btn { background:rgba(0,0,0,0.65); border:3px solid #c53030; color:#fff; font-weight:700; }
        .shoot-btn { 
            background:linear-gradient(145deg,#c53030,#9b2c2c); 
            border:5px solid #fed7d7; 
            box-shadow: 0 4px 15px rgba(197, 48, 48, 0.6);
            min-width: 92px;
            min-height: 68px;
        }
        .shoot-btn:active { transform: scale(0.92); }
    </style>
</head>
<body class="bg-black text-white">
    <div id="game-container">
        <div id="ui-overlay" class="flex flex-col justify-between p-4">
            <div class="flex justify-between items-start hud">
                <div class="bg-black/70 px-4 py-2 rounded border border-red-800">
                    <div class="text-red-500 text-xs tracking-[3px]">SCORE</div>
                    <div id="score" class="text-4xl font-bold">00000</div>
                </div>
                <div class="bg-black/70 px-3 py-1.5 rounded border border-red-800 text-right">
                    <div class="text-red-500 text-[10px] tracking-widest">GOBLINS LEFT</div>
                    <div id="targets-left" class="text-2xl font-bold text-red-400">5</div>
                </div>
            </div>
            <div id="message" class="self-center bg-black/60 px-6 py-2 rounded text-center text-sm border border-red-900/50 hidden">
                <span class="text-red-400">DESTROY THE GOBLINS</span>
            </div>
            <div class="flex justify-between items-end pb-2 hud">
                <div id="controls" class="grid grid-cols-3 gap-1.5 w-[170px]">
                    <div></div>
                    <button id="btn-forward" class="control-btn game-btn col-start-2 h-14 w-14 text-2xl rounded-xl">↑</button>
                    <div></div>
                    <button id="btn-left" class="control-btn game-btn h-14 w-14 text-2xl rounded-xl">←</button>
                    <button id="btn-backward" class="control-btn game-btn h-14 w-14 text-2xl rounded-xl">↓</button>
                    <button id="btn-right" class="control-btn game-btn h-14 w-14 text-2xl rounded-xl">→</button>
                </div>
                <button id="btn-shoot" class="control-btn shoot-btn text-white font-black text-xl rounded-3xl px-6 py-2 shadow-xl">SHOOT</button>
            </div>
        </div>
        <div id="crosshair"></div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let yaw = 0, pitch = -0.15;
        let moveForward=false, moveBackward=false, moveLeft=false, moveRight=false;
        let lastShotTime=0, score=0;
        let projectiles=[], particles=[], enemies=[], wallAABBs=[];
        let goblinTexture = null;
        let isLooking = false, lastTouchX=0, lastTouchY=0;
        const GRAVITY=22, PLAYER_SPEED=11, BULLET_SPEED=52, PLAYER_RADIUS=0.5;

        function updateScore() { document.getElementById('score').textContent = score.toString().padStart(5,'0'); }
        function updateTargetsLeft() { document.getElementById('targets-left').textContent = enemies.length; }

        function createWallAABB(minX,maxX,minZ,maxZ){ wallAABBs.push({minX,maxX,minZ,maxZ}); }

        function checkPlayerCollision(x,z){
            const r = PLAYER_RADIUS;
            for(const w of wallAABBs){
                if(x+r > w.minX && x-r < w.maxX && z+r > w.minZ && z-r < w.maxZ) return true;
            }
            return false;
        }

        function createParticle(pos, vel, life, color, isDebris=false){
            const m = new THREE.Mesh(new THREE.SphereGeometry(isDebris?0.18:0.09,6,6), new THREE.MeshPhongMaterial({color, emissive:color, transparent:true}));
            m.position.copy(pos); scene.add(m);
            particles.push({mesh:m, vel, life, maxLife:life, isDebris});
        }

        function fireProjectile(){
            if(Date.now()-lastShotTime < 115) return;
            lastShotTime = Date.now();
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);

            // Better weapon positioning: spawn projectiles from a "gun" slightly lower than eye level
            // This makes bullets feel like they come from a held weapon, not from the eyes
            const gunPos = camera.position.clone();
            gunPos.y -= 0.28; // lower the gun relative to camera height
            const start = gunPos.clone().add(dir.clone().multiplyScalar(1.15));

            const p = new THREE.Mesh(new THREE.SphereGeometry(0.11,6,6), new THREE.MeshPhongMaterial({color:0xffcc33, emissive:0xff6600}));
            p.position.copy(start); scene.add(p);
            projectiles.push({mesh:p, vel: dir.clone().multiplyScalar(BULLET_SPEED), life:2.2});

            // Muzzle flash positioned at the gun barrel
            const flashPos = gunPos.clone().add(dir.clone().multiplyScalar(0.45));
            const flash = new THREE.Mesh(new THREE.SphereGeometry(0.38,5,5), new THREE.MeshBasicMaterial({color:0xffee66, transparent:true, opacity:0.9}));
            flash.position.copy(flashPos);
            scene.add(flash);
            setTimeout(() => { if(flash.parent) flash.parent.remove(flash); }, 65);

            // Extra muzzle particles from gun
            createParticle(flashPos, new THREE.Vector3(0,2,0), 0.11, 0xffdd88);
        }

        function updateProjectiles(dt){
            for(let i=projectiles.length-1; i>=0; i--){
                const p = projectiles[i];
                p.vel.y -= GRAVITY*0.45*dt;
                p.mesh.position.addScaledVector(p.vel, dt);
                p.life -= dt;
                let hit = p.mesh.position.y < 0.15;
                for(const w of wallAABBs){ 
                    if(p.mesh.position.x>w.minX&&p.mesh.position.x<w.maxX && p.mesh.position.z>w.minZ&&p.mesh.position.z<w.maxZ){hit=true;break;} 
                }
                if(hit || p.life<=0){ 
                    scene.remove(p.mesh); 
                    projectiles.splice(i,1); 
                    if(hit) {
                        createParticle(p.mesh.position.clone(), new THREE.Vector3(0,2.5,0), 0.6, 0x555555, true);
                        for(let k=0; k<2; k++) createParticle(p.mesh.position.clone(), new THREE.Vector3((Math.random()-0.5)*4, 3, (Math.random()-0.5)*4), 0.4, 0x888866);
                    }
                }
            }
        }

        function updateParticles(dt){
            for(let i=particles.length-1;i>=0;i--){
                const p=particles[i];
                p.vel.y -= GRAVITY*dt; 
                p.mesh.position.addScaledVector(p.vel,dt); 
                p.life-=dt;
                if(p.mesh.material) p.mesh.material.opacity = Math.max(0.08, p.life/p.maxLife);
                if(p.isDebris && p.mesh.position.y<0.08 && p.vel.y<0){ 
                    p.mesh.position.y=0.08; p.vel.y*=-0.35; p.vel.x*=0.55; p.vel.z*=0.55; 
                }
                if(p.life<=0){scene.remove(p.mesh); particles.splice(i,1);}
            }
        }

        function checkHits(){
            for(let i=projectiles.length-1;i>=0;i--){
                const pr = projectiles[i];
                for(let j=enemies.length-1;j>=0;j--){
                    if(pr.mesh.position.distanceTo(enemies[j].mesh.position) < 1.55){
                        const hitPos = pr.mesh.position.clone();
                        createParticle(hitPos, new THREE.Vector3(0,5,0), 1.0, 0xff2211, true);
                        for(let k=0; k<6; k++){
                            const vel = new THREE.Vector3((Math.random()-0.5)*7, 2+Math.random()*5, (Math.random()-0.5)*7);
                            createParticle(hitPos, vel, 0.9 + Math.random()*0.6, 0xaa1122, true);
                        }
                        scene.remove(pr.mesh); projectiles.splice(i,1);
                        scene.remove(enemies[j].mesh); enemies.splice(j,1);
                        score += 100; updateScore(); updateTargetsLeft();
                        setTimeout(()=>{ if(enemies.length < 5) spawnEnemy(); }, 1600);
                        return;
                    }
                }
            }
        }

        function createGoblinTexture(){
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 96;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Legs (dark)
            ctx.fillStyle = '#3a1515';
            ctx.fillRect(17, 68, 11, 24);
            ctx.fillRect(36, 68, 11, 24);

            // Body (deep red)
            ctx.fillStyle = '#7a1f1f';
            ctx.fillRect(13, 36, 38, 36);

            // Arms
            ctx.fillStyle = '#5c1616';
            ctx.fillRect(5, 40, 12, 26);
            ctx.fillRect(47, 40, 12, 26);

            // Head
            ctx.fillStyle = '#7a1f1f';
            ctx.fillRect(15, 10, 34, 28);

            // Horns (dark gray)
            ctx.fillStyle = '#2f2f2f';
            ctx.beginPath();
            ctx.moveTo(17, 12); ctx.lineTo(8, -2); ctx.lineTo(20, 11); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(47, 12); ctx.lineTo(56, -2); ctx.lineTo(44, 11); ctx.fill();

            // Glowing eyes (yellow/orange)
            ctx.fillStyle = '#ffcc33';
            ctx.fillRect(21, 18, 7, 7);
            ctx.fillRect(36, 18, 7, 7);

            // Eye detail / brows
            ctx.fillStyle = '#111111';
            ctx.fillRect(20, 17, 9, 2);
            ctx.fillRect(35, 17, 9, 2);

            // Mouth / teeth hint
            ctx.fillStyle = '#ffaa33';
            ctx.fillRect(25, 30, 14, 3);

            // Subtle outline / retro pixel feel
            ctx.strokeStyle = '#2a0a0a';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(15, 10, 34, 28);
            ctx.strokeRect(13, 36, 38, 36);

            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            tex.generateMipmaps = false;
            return tex;
        }

        function spawnEnemy(){
            const spots = [[-13,1.1,-13],[13,1.1,-11],[-11,1.1,11],[11,1.1,12],[1,1.1,-10],[-9,1.1,8],[-14,1.1,2],[14,1.1,-3]];
            let p = spots[Math.floor(Math.random()*spots.length)];
            let mesh;
            if(goblinTexture){
                const g = new THREE.PlaneGeometry(1.7, 2.4);
                const m = new THREE.MeshBasicMaterial({map: goblinTexture, transparent:true, side:THREE.DoubleSide, alphaTest:0.1});
                mesh = new THREE.Mesh(g, m);
                mesh.userData.isGoblin = true;
            } else {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.5,1.9,6), new THREE.MeshPhongMaterial({color:0x8a1f1f, emissive:0x2a0808}));
            }
            mesh.position.set(p[0], p[1], p[2]);
            scene.add(mesh);
            enemies.push({mesh, baseY: p[1]});
            updateTargetsLeft();
        }

        function setupScene(){
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 7, 38);

            camera = new THREE.PerspectiveCamera(68, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.75, 6.5);   // Slightly higher eye level for better feel
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lights - warmer Doom-ish
            scene.add(new THREE.AmbientLight(0x4a4a4a, 0.9));
            const sun = new THREE.DirectionalLight(0xffe8aa, 1.15);
            sun.position.set(8,28,12);
            scene.add(sun);
            scene.add(new THREE.HemisphereLight(0xaaaabb, 0x1f1f22, 0.35));

            // Floor
            const floorMat = new THREE.MeshPhongMaterial({color: 0x25221d, shininess:3});
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(46,46), floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.position.y = 0;
            scene.add(floor);

            // Ceiling for atmosphere
            const ceilingMat = new THREE.MeshPhongMaterial({color: 0x181614, shininess:1});
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(46,46), ceilingMat);
            ceiling.rotation.x = Math.PI/2;
            ceiling.position.y = 7.2;
            scene.add(ceiling);

            // Arena walls
            const wallMat = new THREE.MeshPhongMaterial({color:0x322c25});
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(1.2,6.5,46), wallMat)).position.set(-23,3.2,0);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(1.2,6.5,46), wallMat)).position.set(23,3.2,0);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(46,6.5,1.2), wallMat)).position.set(0,3.2,-23);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(46,6.5,1.2), wallMat)).position.set(0,3.2,23);

            // Central pillar + extra cover pillars
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(3.2,4.5,3.2), new THREE.MeshPhongMaterial({color:0x3a3228}))).position.set(0,2.2,0);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(2.2,3.8,2.2), new THREE.MeshPhongMaterial({color:0x2f2922}))).position.set(-9,1.9,-8);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(2.2,3.8,2.2), new THREE.MeshPhongMaterial({color:0x2f2922}))).position.set(10,1.9,9);
            scene.add(new THREE.Mesh(new THREE.BoxGeometry(1.8,4,1.8), new THREE.MeshPhongMaterial({color:0x362f26}))).position.set(-7,2,6);

            goblinTexture = createGoblinTexture();
            console.log('%c[Goblins] Procedural goblin texture created successfully!', 'color:#4ade80');
            for(let i=0; i<6; i++) spawnEnemy();

            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function updateMovement(dt){
            const d = PLAYER_SPEED * dt;
            const ya = new THREE.Vector3(0,1,0);
            if(moveForward){ 
                const dir = new THREE.Vector3(0,0,-1).applyAxisAngle(ya,yaw); 
                const nx = camera.position.x + dir.x*d; 
                const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; 
            }
            if(moveBackward){ 
                const dir = new THREE.Vector3(0,0,1).applyAxisAngle(ya,yaw); 
                const nx = camera.position.x + dir.x*d; 
                const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; 
            }
            if(moveLeft){ 
                const dir = new THREE.Vector3(-1,0,0).applyAxisAngle(ya,yaw); 
                const nx = camera.position.x + dir.x*d; 
                const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; 
            }
            if(moveRight){ 
                const dir = new THREE.Vector3(1,0,0).applyAxisAngle(ya,yaw); 
                const nx = camera.position.x + dir.x*d; 
                const nz = camera.position.z + dir.z*d;
                if(!checkPlayerCollision(nx, camera.position.z)) camera.position.x = nx;
                if(!checkPlayerCollision(camera.position.x, nz)) camera.position.z = nz; 
            }

            camera.position.y = 1.75; // Keep player eye height (higher for better perspective)
        }

        function animate(){
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            updateMovement(dt);
            updateProjectiles(dt);
            updateParticles(dt);
            checkHits();

            const now = performance.now();
            enemies.forEach(e => {
                if(e.mesh && e.mesh.userData.isGoblin){
                    if(e.baseY === undefined) e.baseY = e.mesh.position.y;
                    e.mesh.position.y = e.baseY + Math.sin(now * 0.0018 + e.mesh.position.x * 0.6) * 0.11;
                    const dx = camera.position.x - e.mesh.position.x;
                    const dz = camera.position.z - e.mesh.position.z;
                    e.mesh.rotation.y = Math.atan2(dx, dz);
                    e.mesh.rotation.x = 0;
                    e.mesh.rotation.z = 0;
                }
            });

            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
            renderer.render(scene, camera);
        }

        function setupControls(){
            const c = renderer.domElement;

            const bind = (id, flag) => {
                const b = document.getElementById(id);
                b.addEventListener('touchstart', e=>{e.preventDefault(); flag(true)}, {passive:false});
                const end = e => {e.preventDefault(); flag(false)};
                b.addEventListener('touchend', end, {passive:false});
                b.addEventListener('touchcancel', end, {passive:false});
            };
            bind('btn-forward', v=>moveForward=v);
            bind('btn-backward', v=>moveBackward=v);
            bind('btn-left', v=>moveLeft=v);
            bind('btn-right', v=>moveRight=v);

            const shootBtn = document.getElementById('btn-shoot');
            let si = null;
            const startShooting = (e) => { 
                e.preventDefault(); 
                fireProjectile(); 
                if(si) clearInterval(si); 
                si = setInterval(fireProjectile, 135); 
            };
            const stopShooting = () => { if(si){ clearInterval(si); si=null; } };

            shootBtn.addEventListener('touchstart', startShooting, {passive:false});
            shootBtn.addEventListener('touchend', stopShooting, {passive:false});
            shootBtn.addEventListener('touchcancel', stopShooting, {passive:false});

            // Touch look - improved exclusion for shoot button
            c.addEventListener('touchstart', e => { 
                if(e.target.closest('#controls') || e.target.closest('#btn-shoot')) return; 
                isLooking=true; lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY; 
            }, {passive:false});
            c.addEventListener('touchmove', e => { 
                if(!isLooking) return; 
                const t=e.touches[0]; 
                yaw += (t.clientX-lastTouchX)*0.0032;
                pitch += (t.clientY-lastTouchY)*0.0035;
                pitch=Math.max(-1.45,Math.min(1.05,pitch));
                lastTouchX=t.clientX; lastTouchY=t.clientY; 
            }, {passive:false});
            c.addEventListener('touchend', ()=> isLooking=false);

            // Keyboard support (WASD + Space/F)
            document.addEventListener('keydown', e => {
                const k = e.key.toLowerCase();
                if(k==='w' || k==='arrowup') moveForward = true;
                if(k==='s' || k==='arrowdown') moveBackward = true;
                if(k==='a' || k==='arrowleft') moveLeft = true;
                if(k==='d' || k==='arrowright') moveRight = true;
                if(k===' ' || k==='f') { e.preventDefault(); fireProjectile(); }
            });
            document.addEventListener('keyup', e => {
                const k = e.key.toLowerCase();
                if(k==='w' || k==='arrowup') moveForward = false;
                if(k==='s' || k==='arrowdown') moveBackward = false;
                if(k==='a' || k==='arrowleft') moveLeft = false;
                if(k==='d' || k==='arrowright') moveRight = false;
            });

            window.addEventListener('resize', ()=>{ 
                camera.aspect = window.innerWidth/window.innerHeight; 
                camera.updateProjectionMatrix(); 
                renderer.setSize(window.innerWidth, window.innerHeight); 
            });
        }

        function startGame(){
            setupScene();
            clock = new THREE.Clock();
            setupControls();
            updateScore();
            updateTargetsLeft();

            const msgEl = document.getElementById('message');
            msgEl.classList.remove('hidden');
            setTimeout(() => {
                msgEl.style.transition = 'opacity 1.2s ease';
                msgEl.style.opacity = '0';
                setTimeout(() => { 
                    msgEl.classList.add('hidden'); 
                    msgEl.style.opacity = '1'; 
                    msgEl.style.transition = '';
                }, 1200);
            }, 2800);

            animate();
            console.log('%c[Doom FPS] Camera height raised + weapon projectiles aligned + shooting button improved!', 'color:#22c55e');
        }
        window.onload = startGame;
    </script>
</body>
</html>
